name: MCP Tests

on:
  pull_request:
    paths:
      - 'MCP/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-tests.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'MCP/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/mcp-tests.yml'

permissions:
  contents: read

jobs:
  test-mcp:
    name: Node ${{ matrix.node-version }} MCP
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run MCP tests
        run: npm run test:mcp
